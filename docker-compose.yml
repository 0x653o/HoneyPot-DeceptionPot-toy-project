# ==============================================================================
# Honeypot System — Docker Compose
# ==============================================================================
# Two containers on separate networks:
#   1. honeypot — attacker-facing, ports 10001-10005
#   2. mgmt    — management API + Web UI, localhost:9090 only
# ==============================================================================

services:
  # --- Honeypot Core ---
  # Attacker-facing: runs protocol handlers inside nsjail sandboxes
  honeypot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honeypot-core
    restart: unless-stopped
    ports:
      # Sequential ports — configurable via .env
      - "${PORT_SSH:-10001}:10001"   # Protocol 1
      - "${PORT_HTTP:-10002}:10002"   # Protocol 2
      - "${PORT_FTP:-10003}:10003"   # Protocol 3
      - "${PORT_TELNET:-10004}:10004"   # Protocol 4
      - "${PORT_SMTP:-10005}:10005"   # Protocol 5
      - "${PORT_HTTPS:-10443}:10443" # HTTPS Protocol
    volumes:
      - honeypot-data:/app/data
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN       # Required for nsjail namespaces
      - NET_ADMIN        # Required for nsjail network namespace
    security_opt:
      - no-new-privileges:true
      - seccomp:seccomp-profile.json
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    networks:
      - honeypot_net
      - mgmt_net       # Needs access to write shared data volume
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',10001)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Management API + Web UI ---
  # Internal only: NOT accessible from honeypot-facing network
  mgmt:
    build:
      context: .
      dockerfile: Dockerfile.mgmt
    container_name: honeypot-mgmt
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT_MGMT:-9090}:9090"   # Bound to localhost ONLY
    environment:
      - HONEYPOT_API_KEY=${HONEYPOT_API_KEY:-default_secret}
    volumes:
      - honeypot-data:/app/data:ro   # Read-only access to honeypot data
      - db-logs:/app/db-logs:ro      # Read-only access to native database logs
    depends_on:
      honeypot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Polyglot Web Vulnerabilities ---
  vuln-node-rce:
    build: vulnerabilities/vuln-node-rce/
    container_name: honeypot-vuln-node-rce
    restart: unless-stopped
    ports:
      - "${PORT_NODE_RCE:-8081}:8080"
    environment:
      - MGMT_API_URL=http://mgmt:9090
      - HONEYPOT_API_KEY=${HONEYPOT_API_KEY:-default_secret}
    networks:
      - honeypot_net
      - mgmt_net
    depends_on:
      - mgmt
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vuln-node-ssrf:
    build: vulnerabilities/vuln-node-ssrf/
    container_name: honeypot-vuln-node-ssrf
    restart: unless-stopped
    ports:
      - "${PORT_NODE_SSRF:-8082}:8080"
    environment:
      - MGMT_API_URL=http://mgmt:9090
      - HONEYPOT_API_KEY=${HONEYPOT_API_KEY:-default_secret}
    networks:
      - honeypot_net
      - mgmt_net
    depends_on:
      - mgmt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vuln-php-lfi:
    build: vulnerabilities/vuln-php-lfi/
    container_name: honeypot-vuln-php-lfi
    restart: unless-stopped
    ports:
      - "${PORT_PHP_LFI:-8083}:8080"
    environment:
      - MGMT_API_URL=http://mgmt:9090
      - HONEYPOT_API_KEY=${HONEYPOT_API_KEY:-default_secret}
    networks:
      - honeypot_net
      - mgmt_net
    depends_on:
      - mgmt
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vuln-php-sqli:
    build: vulnerabilities/vuln-php-sqli/
    container_name: honeypot-vuln-php-sqli
    restart: unless-stopped
    ports:
      - "${PORT_PHP_SQLI:-8084}:8080"
    environment:
      - MGMT_API_URL=http://mgmt:9090
      - HONEYPOT_API_KEY=${HONEYPOT_API_KEY:-default_secret}
    networks:
      - honeypot_net
      - mgmt_net
    depends_on:
      - mgmt
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Genuine Database Honeypots ---
  mysql:
    image: mysql:8.0
    container_name: honeypot-mysql
    restart: unless-stopped
    ports:
      - "${PORT_MYSQL:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=toor   # Weak password for honeypot
    command: --general-log=1 --general-log-file=/var/log/mysql/mysql.log
    volumes:
      - db-logs:/var/log/mysql
    networks:
      - honeypot_net

  postgres:
    image: postgres:15-alpine
    container_name: honeypot-postgres
    restart: unless-stopped
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    environment:
      - POSTGRES_PASSWORD=postgres # Weak password
    command: postgres -c logging_collector=on -c log_statement=all
    volumes:
      - db-logs:/var/lib/postgresql/data
    networks:
      - honeypot_net

  redis:
    image: redis:7-alpine
    container_name: honeypot-redis
    restart: unless-stopped
    ports:
      - "${PORT_REDIS:-6379}:6379"
    command: redis-server --requirepass admin123 --loglevel verbose
    volumes:
      - db-logs:/var/log/redis
    networks:
      - honeypot_net

  mongo:
    image: mongo:6
    container_name: honeypot-mongo
    restart: unless-stopped
    ports:
      - "${PORT_MONGO:-27017}:27017"
    command: --profile 2
    volumes:
      - db-logs:/var/log/mongodb
    networks:
      - honeypot_net

# --- Volumes ---
volumes:
  honeypot-data:
    driver: local
  db-logs:
    driver: local

# --- Networks ---
networks:
  # Attacker-facing network
  honeypot_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: hp-public

  # Internal management network (no external access)
  mgmt_net:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: hp-mgmt
